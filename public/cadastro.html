<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - Sistema de Finanças</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>
    <div class="login-container">
        <form id="cadastro-form">
            <h2>Criar Conta</h2>
            <div class="input-group">
                <label for="nome">Nome Completo</label>
                <input type="text" id="nome" name="nome" required placeholder="Seu nome completo">
            </div>
            <div class="input-group">
                <label for="email">E-mail</label>
                <input type="email" id="email" name="email" required placeholder="seu@email.com">
            </div>
            <div class="input-group">
                <label for="senha">Senha</label>
                <input type="password" id="senha" name="senha" required placeholder="Crie uma senha" minlength="4">
            </div>
            <button type="submit">Cadastrar</button>
            <p id="mensagem-erro" class="erro"></p>
            <p id="mensagem-sucesso" class="sucesso"></p>
            <p class="link-login">Já tem conta? <a href="index.html">Fazer login</a></p>
        </form>
    </div>
    <script src="cadastro.js"></script>
</body>
</html>
