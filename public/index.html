<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sistema de Finanças</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>
    <div class="login-container">
        <form id="login-form">
            <h2>Acessar Sistema</h2>
            <div class="input-group">
                <label for="email">Usuário ou E-mail</label>
                <input type="text" id="email" name="email" required placeholder="admin ou seu@email.com">
            </div>
            <div class="input-group">
                <label for="senha">Senha</label>
                <input type="password" id="senha" name="senha" required placeholder="Sua senha">
            </div>
            <button type="submit">Entrar</button>
            <p id="mensagem-erro" class="erro"></p>
            <p class="link-login">Não tem conta? <a href="cadastro.html">Criar conta</a></p>
        </form>
    </div>
    <script src="login.js"></script>
</body>
</html>
